<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>{% if page.title %}{{ page.title | escape }} - {{ site.title | escape }}{% else %}{{ site.title | escape }}{% endif %}</title>
    <meta
      name="description"
      content="{{ page.description | default: site.description | escape }}"
    />
    <link rel="preconnect" href="https://fonts.googleapis.com" />
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
    <link
      href="https://fonts.googleapis.com/css2?family=Space+Grotesk:wght@300;400;500;600&family=Space+Mono:ital,wght@0,400;0,700;1,400&display=swap"
      rel="stylesheet"
    />
    <link rel="stylesheet" href="/css/styles.css" />

    {% include analytics.html %}
  </head>
  <body>
    <canvas id="starfield"></canvas>

    {% include nav.html %}

    {{ content }}

    <footer class="site-footer">
      {% include footer-base.html %}
    </footer>

    <script src="/js/main.js"></script>

  </body>
</html>
